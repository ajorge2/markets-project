<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      transition: width 0.18s ease, min-width 0.18s ease, opacity 0.18s ease;
      overflow: hidden;
    }
    #sidebar.collapsed {
      width: 0;
      min-width: 0;
      opacity: 0;
      border-right-width: 0;
    }

    #sidebar-toggle {
      background: transparent;
      border: 1px solid transparent;
      color: #8b949e;
      padding: 4px 8px;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
    }
    #sidebar-toggle:hover { color: #e6edf3; background: #21262d; border-color: #30363d; }

    #load-controls {
      padding: 12px;
      border-bottom: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.1s;
    }
    button:hover { background: #30363d; }
    button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    button.primary:hover { background: #388bfd; }

    #file-label {
      display: block;
      background: #21262d;
      color: #8b949e;
      border: 1px dashed #30363d;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
    }
    #file-label:hover { background: #30363d; color: #e6edf3; }
    #file-input { display: none; }

    #file-tree { flex: 1; overflow-y: auto; padding: 6px 0; }

    .tree-folder {
      padding: 8px 12px 3px;
      font-size: 10px;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .tree-item {
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      overflow: hidden;
    }
    .tree-item:hover { background: #21262d; color: #e6edf3; }
    .tree-item.active { background: #1f6feb1a; color: #58a6ff; }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.current  { background: #3fb950; }
    .status-dot.proposed { background: #d29922; }

    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    #topbar {
      height: 44px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      flex-shrink: 0;
    }

    #breadcrumb {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
    }
    .crumb { color: #58a6ff; cursor: pointer; }
    .crumb:hover { text-decoration: underline; }
    .crumb-sep { color: #484f58; }
    .crumb-current { color: #e6edf3; }

    #status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      display: none;
    }
    #status-badge.current  { background: #3fb95018; color: #3fb950; border: 1px solid #3fb95033; }
    #status-badge.proposed { background: #d2992218; color: #d29922; border: 1px solid #d2992233; }

    #topbar-actions { display: flex; gap: 6px; }

    #cy { flex: 1; background: #0d1117; }

    #empty-state {
      position: absolute;
      inset: 44px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #484f58;
      pointer-events: none;
    }
    #empty-state h2 { font-size: 16px; font-weight: 400; }
    #empty-state p  { font-size: 12px; }

    #tooltip {
      position: fixed;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 999;
    }
    #tooltip .tt-label { color: #e6edf3; font-weight: 500; margin-bottom: 2px; }
    #tooltip .tt-type  { color: #8b949e; font-size: 11px; }
    #tooltip .tt-drill { color: #58a6ff; font-size: 11px; margin-top: 4px; }

    #legend {
      position: absolute;
      right: 14px;
      bottom: 14px;
      background: #161b22ee;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      color: #8b949e;
      z-index: 100;
      user-select: none;
      max-width: 220px;
      backdrop-filter: blur(2px);
    }
    #legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      color: #e6edf3;
      font-weight: 500;
      gap: 12px;
    }
    #legend-toggle { font-size: 10px; color: #484f58; }
    #legend-body { margin-top: 6px; }
    #legend-body.collapsed { display: none; }
    .legend-section-title {
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #484f58;
      margin: 6px 0 3px;
    }
    .legend-section-title:first-child { margin-top: 0; }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1.5px solid;
    }
    .legend-swatch.barrel    { border-radius: 3px 3px 7px 7px; }
    .legend-swatch.rect      { border-radius: 0; }
    .legend-line-wrap {
      width: 28px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .legend-line {
      flex: 1;
      height: 0;
      border-top: 1.5px solid #8b949e;
    }
    .legend-line.dashed { border-top-style: dashed; }
    .legend-line.dotted { border-top-style: dotted; }
    .legend-line.faint  { border-top-color: #484f58; border-top-style: dashed; }
    .legend-arrow {
      color: #8b949e;
      font-size: 10px;
      margin-left: -2px;
    }
    .legend-arrow.faint { color: #484f58; }

    #toast {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 12px;
      color: #e6edf3;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      max-width: 460px;
    }
    #toast.show { opacity: 1; }
    #toast.error { border-color: #f8514955; color: #ffa198; }
    #toast.ok    { border-color: #3fb95055; color: #56d364; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="load-controls">
    <button class="primary" id="open-dir-btn">Open Architecture Folder</button>
    <label id="file-label" for="file-input">or pick JSON files</label>
    <input type="file" id="file-input" multiple accept=".json">
  </div>
  <div id="file-tree"></div>
</div>

<div id="main">
  <div id="topbar">
    <button id="sidebar-toggle" title="Toggle sidebar (⌘B)">☰</button>
    <div id="breadcrumb"></div>
    <div id="status-badge"></div>
    <div id="topbar-actions">
      <button id="reload-btn" title="Re-read files from disk">↻ Reload</button>
      <button id="fit-btn">Fit</button>
      <button id="back-btn" style="display:none">← Back</button>
    </div>
  </div>
  <div id="cy"></div>
  <div id="toast"></div>
  <div id="empty-state">
    <h2>Architecture Viewer</h2>
    <p>Open an architecture folder to begin</p>
  </div>
  <div id="legend">
    <div id="legend-header">
      <span>Legend</span>
      <span id="legend-toggle">▾</span>
    </div>
    <div id="legend-body">
      <div class="legend-section-title">Nodes</div>
      <div id="legend-nodes"></div>
      <div class="legend-section-title">Edges</div>
      <div id="legend-edges"></div>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-label" id="tt-label"></div>
  <div class="tt-type"  id="tt-type"></div>
  <div class="tt-drill" id="tt-drill"></div>
</div>

<script>
cytoscape.use(cytoscapeDagre);

const NODE_COLORS = {
  service:   '#4a90d9',
  database:  '#e6954a',
  client:    '#56a854',
  external:  '#6e7681',
  component: '#a78bfa',
  entity:    '#2dd4bf',
  actor:     '#f472b6',
  default:   '#8b949e'
};

const RANK_DIR = { system: 'TB', component: 'LR', flow: 'TB', data: 'LR' };

let cy          = null;
let files       = {};
let history     = [];
let currentPath = null;

// ── Persistence ────────────────────────────────────────────────────

const LS_FILES = 'arch-viewer:files';
const LS_PATH  = 'arch-viewer:lastPath';
const IDB_NAME = 'arch-viewer';
const IDB_STORE = 'handles';

function persistFiles() {
  try { localStorage.setItem(LS_FILES, JSON.stringify(files)); } catch (e) { console.warn('persist failed', e); }
}
function persistPath(p) {
  try { localStorage.setItem(LS_PATH, p); } catch {}
}

// IndexedDB helpers — used to persist the directory handle across sessions.
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = () => res();
    tx.onerror    = () => rej(tx.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const r  = tx.objectStore(IDB_STORE).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}

// Try to re-read the saved directory handle from disk.
// Returns one of: 'ok' | 'no-handle' | 'no-permission' | 'error'
async function reloadFromHandle({ silent = true } = {}) {
  let dir;
  try { dir = await idbGet('dir'); } catch { return 'error'; }
  if (!dir) return 'no-handle';
  try {
    let perm = await dir.queryPermission({ mode: 'read' });
    if (perm !== 'granted') {
      if (silent) return 'no-permission';
      try { perm = await dir.requestPermission({ mode: 'read' }); } catch { return 'no-permission'; }
      if (perm !== 'granted') return 'no-permission';
    }
    files = {};
    await readDir(dir, '');
    persistFiles();
    buildTree();
    const last = localStorage.getItem(LS_PATH);
    if (last && files[last]) open(last, true);
    return 'ok';
  } catch (e) {
    console.warn('reload from handle failed', e);
    return 'error';
  }
}

async function tryRestore() {
  // First try the live re-read — picks up any file changes since last session.
  if (await reloadFromHandle({ silent: true }) === 'ok') return true;
  // Fall back to the localStorage snapshot.
  try {
    const raw = localStorage.getItem(LS_FILES);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    if (!parsed || Object.keys(parsed).length === 0) return false;
    files = parsed;
    buildTree();
    const last = localStorage.getItem(LS_PATH);
    if (last && files[last]) open(last, true);
    return true;
  } catch { return false; }
}

// ── Loading ────────────────────────────────────────────────────────

document.getElementById('open-dir-btn').addEventListener('click', async () => {
  if (!window.showDirectoryPicker) {
    document.getElementById('file-input').click();
    return;
  }
  try {
    const dir = await window.showDirectoryPicker();
    files = {};
    await readDir(dir, '');
    buildTree();
    persistFiles();
    try { await idbSet('dir', dir); } catch (e) { console.warn('handle persist failed', e); }
  } catch (e) {
    if (e.name !== 'AbortError') console.error(e);
  }
});

document.getElementById('file-input').addEventListener('change', async (e) => {
  files = {};
  for (const f of e.target.files) {
    try { files[f.name] = JSON.parse(await f.text()); } catch {}
  }
  buildTree();
  persistFiles();
});

async function readDir(handle, prefix) {
  for await (const [name, h] of handle) {
    const path = prefix ? `${prefix}/${name}` : name;
    if (h.kind === 'file' && name.endsWith('.json')) {
      try { files[path] = JSON.parse(await (await h.getFile()).text()); } catch {}
    } else if (h.kind === 'directory') {
      await readDir(h, path);
    }
  }
}

// ── File Tree ──────────────────────────────────────────────────────

function buildTree() {
  const tree = document.getElementById('file-tree');
  tree.innerHTML = '';

  const byFolder = {};
  for (const path of Object.keys(files).sort()) {
    const parts = path.split('/');
    const folder = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
    (byFolder[folder] = byFolder[folder] || []).push(path);
  }

  // Order folders by zoom level (system → component → flow → data), not alphabetically.
  const FOLDER_ORDER = ['', 'components', 'flows', 'data'];
  const orderedFolders = Object.keys(byFolder).sort((a, b) => {
    const ia = FOLDER_ORDER.indexOf(a);
    const ib = FOLDER_ORDER.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib) || a.localeCompare(b);
  });

  for (const folder of orderedFolders) {
    const paths = byFolder[folder];
    if (folder) {
      const d = document.createElement('div');
      d.className = 'tree-folder';
      d.textContent = folder;
      tree.appendChild(d);
    }
    for (const path of paths) {
      const data   = files[path];
      const item   = document.createElement('div');
      item.className = 'tree-item';
      item.title   = path;

      const dot = document.createElement('span');
      dot.className = `status-dot ${data?.status || 'current'}`;

      const label = document.createElement('span');
      label.textContent = path.split('/').pop().replace('.json', '');

      item.append(dot, label);
      item.addEventListener('click', () => open(path, true));
      tree.appendChild(item);
    }
  }

  const paths = Object.keys(files);
  const sys   = paths.find(p => p === 'system.json' || p.endsWith('/system.json'));
  if (sys)           open(sys, true);
  else if (paths[0]) open(paths[0], true);
}

// ── Diagram Rendering ──────────────────────────────────────────────

function open(path, reset) {
  const data = files[path];
  if (!data) return;
  if (reset) history = [];
  currentPath = path;
  persistPath(path);
  syncSidebar(path);
  syncTopbar(data, path);
  render(data);
}

function render(data) {
  document.getElementById('empty-state').style.display = 'none';
  if (cy) cy.destroy();

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements:  buildElements(data),
    style:     buildStyle(),
    layout: {
      name:    'dagre',
      rankDir: RANK_DIR[data.zoom] || 'TB',
      nodeSep: 60,
      rankSep: 80,
      animate: false
    },
    minZoom: 0.1,
    maxZoom: 4
  });

  cy.on('tap', 'node', (e) => {
    const drill = e.target.data('drilldown');
    if (!drill) return;
    const resolved = resolve(currentPath, drill);
    if (!files[resolved]) return;
    history.push(currentPath);
    open(resolved, false);
    syncBack();
  });

  cy.on('mouseover', 'node', (e) => {
    const d = e.target.data();
    document.getElementById('tt-label').textContent = d.label;
    document.getElementById('tt-type').textContent  = d.type || '';
    document.getElementById('tt-drill').textContent = d.drilldown ? '↓ click to drill down' : '';
    document.getElementById('tooltip').style.display = 'block';
  });
  cy.on('mouseout',  'node', () => { document.getElementById('tooltip').style.display = 'none'; });
  cy.on('mousemove', (e) => {
    const t = document.getElementById('tooltip');
    t.style.left = (e.originalEvent.clientX + 14) + 'px';
    t.style.top  = (e.originalEvent.clientY + 14) + 'px';
  });

  document.getElementById('fit-btn').onclick = () => cy.fit(undefined, 40);
}

function buildElements(data) {
  const els = [];

  if (data.zoom === 'data') {
    (data.entities || []).forEach(e => {
      const fields = e.fields || [];
      const maxName = fields.reduce((m, f) => Math.max(m, f.name.length), 0);
      const fieldLines = fields.map(f => `${f.name.padEnd(maxName + 2)}${f.type}`);
      const title = e.id.toUpperCase();
      const parts = [title, '═'.repeat(title.length)];
      if (e.description) parts.push(e.description);
      parts.push('');
      parts.push('─── fields in each row ───');
      parts.push(...fieldLines);
      els.push({ data: { id: e.id, label: parts.join('\n'), type: 'entity', drilldown: e.drilldown } });
    });
    (data.relations || []).forEach((r, i) => {
      els.push({ data: { id: `e${i}`, source: r.from, target: r.to, label: [r.label, r.cardinality ? `[${r.cardinality}]` : ''].filter(Boolean).join(' '), type: 'data' } });
    });
    return els;
  }

  (data.nodes || []).forEach(n => {
    els.push({ data: { id: n.id, label: n.label || n.id, type: n.type || 'default', drilldown: n.drilldown } });
  });

  const edges = data.zoom === 'flow' ? (data.steps || data.edges || []) : (data.edges || []);
  edges.forEach((e, i) => {
    const label = data.zoom === 'flow' ? `${i + 1}. ${e.label || ''}`.trim() : (e.label || '');
    els.push({ data: { id: `e${i}`, source: e.from, target: e.to, label, type: e.type || 'sync' } });
  });

  return els;
}

function buildStyle() {
  const typeStyles = Object.entries(NODE_COLORS).map(([t, c]) => ({
    selector: `node[type="${t}"]`,
    style: { 'background-color': c, 'border-color': c }
  }));

  return [
    {
      selector: 'node',
      style: {
        label: 'data(label)',
        color: '#e6edf3',
        'font-family': 'SF Mono, Fira Code, Menlo, monospace',
        'font-size': '12px',
        'text-valign': 'center',
        'text-halign': 'center',
        'text-wrap': 'wrap',
        'text-max-width': '130px',
        'background-color': NODE_COLORS.default,
        'border-width': 2,
        'border-color': NODE_COLORS.default,
        'border-opacity': 0.5,
        padding: '10px',
        width: 'label',
        height: 'label',
        shape: 'roundrectangle',
        cursor: 'default'
      }
    },
    { selector: 'node[type="database"]', style: { shape: 'barrel' } },
    { selector: 'node[?drilldown]',      style: { 'border-opacity': 1, cursor: 'pointer' } },
    { selector: 'node:selected',         style: { 'border-width': 3, 'border-opacity': 1 } },
    ...typeStyles,
    {
      selector: 'node[type="entity"]',
      style: {
        shape: 'rectangle',
        'background-color': '#0d1117',
        'border-color': NODE_COLORS.entity,
        'border-width': 2,
        'text-valign': 'center',
        'text-halign': 'center',
        'text-justification': 'left',
        'font-size': '11px',
        'text-wrap': 'wrap',
        'text-max-width': '380px',
        padding: '14px',
        color: '#e6edf3',
        'line-height': 1.45
      }
    },
    {
      selector: 'edge',
      style: {
        label: 'data(label)',
        color: '#8b949e',
        'font-family': 'SF Mono, Fira Code, Menlo, monospace',
        'font-size': '10px',
        'text-background-color': '#0d1117',
        'text-background-opacity': 1,
        'text-background-padding': '2px',
        width: 1.5,
        'line-color': '#30363d',
        'target-arrow-color': '#30363d',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'arrow-scale': 1.2
      }
    },
    { selector: 'edge[type="async"]',  style: { 'line-style': 'dashed',  'line-dash-pattern': [6, 3] } },
    { selector: 'edge[type="return"]', style: { 'line-style': 'dashed',  'line-dash-pattern': [3, 3], 'line-color': '#484f58', 'target-arrow-color': '#484f58' } },
    { selector: 'edge[type="data"]',   style: { 'line-style': 'dotted',  'target-arrow-shape': 'none' } }
  ];
}

// ── Navigation ─────────────────────────────────────────────────────

function resolve(from, rel) {
  const base = from.split('/').slice(0, -1).join('/');
  return base ? `${base}/${rel}` : rel;
}

function syncSidebar(path) {
  document.querySelectorAll('.tree-item').forEach(el => {
    el.classList.toggle('active', el.title === path);
  });
}

function syncTopbar(data, path) {
  const crumb = document.getElementById('breadcrumb');
  crumb.innerHTML = '';
  const stack = [...history, path];

  stack.forEach((p, i) => {
    const name = p.split('/').pop().replace('.json', '');
    if (i < stack.length - 1) {
      const s = document.createElement('span');
      s.className = 'crumb';
      s.textContent = name;
      s.onclick = () => { history = history.slice(0, i); open(p, false); syncBack(); };
      crumb.appendChild(s);
      const sep = document.createElement('span');
      sep.className = 'crumb-sep';
      sep.textContent = ' / ';
      crumb.appendChild(sep);
    } else {
      const s = document.createElement('span');
      s.className = 'crumb-current';
      s.textContent = name;
      crumb.appendChild(s);
    }
  });

  const badge = document.getElementById('status-badge');
  if (data.status) {
    badge.textContent = data.status;
    badge.className   = data.status;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }

  syncBack();
}

function syncBack() {
  const btn = document.getElementById('back-btn');
  btn.style.display = history.length ? '' : 'none';
  btn.onclick = () => { const p = history.pop(); if (p) open(p, false); syncBack(); };
}

// ── Legend ─────────────────────────────────────────────────────────

function buildLegend() {
  const NODE_LEGEND = [
    { type: 'service',   label: 'Service / API',     shape: '' },
    { type: 'database',  label: 'Database / store',  shape: 'barrel' },
    { type: 'client',    label: 'Client / UI',       shape: '' },
    { type: 'external',  label: 'External system',   shape: '' },
    { type: 'component', label: 'Internal module',   shape: '' },
    { type: 'entity',    label: 'Data entity',       shape: 'rect' },
    { type: 'actor',     label: 'Person / role',     shape: '' }
  ];
  const EDGE_LEGEND = [
    { type: 'sync',   label: 'Sync call',          cls: '',       arrow: '▸' },
    { type: 'async',  label: 'Async / event',      cls: 'dashed', arrow: '▸' },
    { type: 'return', label: 'Return value',       cls: 'faint',  arrow: '▸', arrowCls: 'faint' },
    { type: 'data',   label: 'Data relation',      cls: 'dotted', arrow: '' }
  ];

  const nodesEl = document.getElementById('legend-nodes');
  for (const n of NODE_LEGEND) {
    const row = document.createElement('div');
    row.className = 'legend-row';
    const sw = document.createElement('div');
    sw.className = `legend-swatch ${n.shape}`;
    sw.style.background = NODE_COLORS[n.type];
    sw.style.borderColor = NODE_COLORS[n.type];
    const lbl = document.createElement('span');
    lbl.textContent = n.label;
    row.append(sw, lbl);
    nodesEl.appendChild(row);
  }

  const edgesEl = document.getElementById('legend-edges');
  for (const e of EDGE_LEGEND) {
    const row = document.createElement('div');
    row.className = 'legend-row';
    const wrap = document.createElement('div');
    wrap.className = 'legend-line-wrap';
    const line = document.createElement('div');
    line.className = `legend-line ${e.cls}`;
    wrap.appendChild(line);
    if (e.arrow) {
      const arr = document.createElement('span');
      arr.className = `legend-arrow ${e.arrowCls || ''}`;
      arr.textContent = e.arrow;
      wrap.appendChild(arr);
    }
    const lbl = document.createElement('span');
    lbl.textContent = e.label;
    row.append(wrap, lbl);
    edgesEl.appendChild(row);
  }

  document.getElementById('legend-header').addEventListener('click', () => {
    const body = document.getElementById('legend-body');
    body.classList.toggle('collapsed');
    const tog = document.getElementById('legend-toggle');
    tog.textContent = body.classList.contains('collapsed') ? '▸' : '▾';
  });
}
buildLegend();
tryRestore();

function toast(msg, kind = '', ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${kind}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = kind; }, ms);
}

// Sidebar toggle (persisted, with ⌘B / Ctrl+B shortcut).
const LS_SIDEBAR = 'arch-viewer:sidebarCollapsed';
function setSidebar(collapsed) {
  document.getElementById('sidebar').classList.toggle('collapsed', collapsed);
  try { localStorage.setItem(LS_SIDEBAR, collapsed ? '1' : '0'); } catch {}
  // Re-fit the diagram after the sidebar animation completes so the canvas uses the new space.
  setTimeout(() => { if (cy) cy.resize(); }, 200);
}
if (localStorage.getItem(LS_SIDEBAR) === '1') setSidebar(true);
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  setSidebar(!document.getElementById('sidebar').classList.contains('collapsed'));
});
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'b') {
    e.preventDefault();
    setSidebar(!document.getElementById('sidebar').classList.contains('collapsed'));
  }
});

document.getElementById('reload-btn').addEventListener('click', async () => {
  const result = await reloadFromHandle({ silent: false });
  if (result === 'ok')              toast('Reloaded from disk', 'ok');
  else if (result === 'no-handle')  toast("No folder linked yet — click 'Open Architecture Folder' once. Future reloads will be instant.", 'error', 5000);
  else if (result === 'no-permission') toast('Folder permission denied. Click Reload again and allow access.', 'error', 4000);
  else                              toast('Reload failed — check the browser console.', 'error', 4000);
});
</script>
